<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Image Gallery</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f0f0f;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
}

.viewer img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>
</head>

<body>

<h1>Image Gallery</h1>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
<img id="fullImage">
</div>

<script>

const username = "constantabrar";
const repo = "gi28-assets";
const folder = "";

const api = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

async function loadImages(){

const res = await fetch(api);
const data = await res.json();

const gallery = document.getElementById("gallery");

data.forEach(file => {

if(file.type === "file" && file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)){

const img = document.createElement("img");
img.src = file.download_url;
img.loading="lazy";

img.onclick=()=>{
document.getElementById("viewer").style.display="flex";
document.getElementById("fullImage").src=file.download_url;
}

gallery.appendChild(img);

}

});

}

document.getElementById("viewer").onclick=()=>{
document.getElementById("viewer").style.display="none";
}

loadImages();

</script>

</body>
</html>
